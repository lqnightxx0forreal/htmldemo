<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マリの日常 - Pro Super Ultimate Max</title>

<style>
html {
    scroll-behavior:smooth;
}

body {
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:white;
    transition:0.5s;
    overflow-x:hidden;
}

/* ライトモード */
.light {
    background:#f8f9fa;
    color:#333;
}

/* ナビ */
nav {
    position:fixed;
    width:100%;
    top:0;
    background:#1e3a8a;
    padding:10px;
    display:flex;
    justify-content:space-between;
    z-index:10;
}

/* セクション */
section {
    padding:120px 20px;
    max-width:900px;
    margin:auto;
    opacity:0;
    transform:translateY(60px);
    transition:1s;
}

/* スクロール表示 */
.show {
    opacity:1;
    transform:translateY(0);
}

/* カード */
.card {
    background:#1e293b;
    padding:20px;
    margin:20px 0;
    border-radius:12px;
    transition:0.3s;
    box-shadow:0 0 0 rgba(0,0,0,0);
}
.card:hover {
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* 犬 */
.dog {
    width:220px;
    display:block;
    margin:auto;
    border-radius:50%;
    cursor:pointer;
    transition:0.3s;
    filter: drop-shadow(0 0 12px #3b82f6);
}
.dog:hover {
    transform:scale(1.1) rotate(5deg);
}

/* ボタン */
button {
    background:#3b82f6;
    border:none;
    padding:10px 20px;
    color:white;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}
button:hover {
    background:#1e40af;
}

/* 爆発 */
#boom {
    font-size:32px;
    text-align:center;
    margin-top:20px;
    animation:shake 0.3s infinite alternate;
}

@keyframes shake {
    from {transform:translateX(-3px);}
    to {transform:translateX(3px);}
}

/* 背景エフェクト */
.bg-glow {
    position:fixed;
    width:300px;
    height:300px;
    background:#3b82f6;
    filter:blur(120px);
    opacity:0.3;
    top:20%;
    left:10%;
    z-index:-1;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<nav>
<div>🐶 マリ PRO</div>
<button onclick="toggleMode()">🌙</button>
</nav>

<section>
<h1>マリの日常</h1>
<p>クリックでジャンプ＆暴れる犬サイト</p>

<img src="IMG_0086.png" id="dog" class="dog" onclick="jump()">
</section>

<section>
<h2>好きなもの</h2>
<div class="card">🍜 ラーメン</div>
<div class="card">🥔 いも</div>
<div class="card">👤 しげおさん</div>
</section>

<section>
<h2>散歩スポット</h2>
<div class="card">福島県</div>
<div class="card">川俣町</div>
<div class="card">ベッド（最終形態）</div>
</section>

<section>
<h2>実験ボタン</h2>
<button onclick="explode()">押すと何か起きる</button>
<div id="boom"></div>
</section>

<script>

/* スクロールアニメ */
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if(top < window.innerHeight - 80){
            sec.classList.add("show");
        }
    });
});

/* ダーク/ライト */
function toggleMode(){
    document.body.classList.toggle("light");
}

/* 犬ジャンプ */
function jump(){
    const d = document.getElementById("dog");
    d.style.transform = "translateY(-80px) scale(1.2)";
    setTimeout(()=>{
        d.style.transform = "translateY(0) scale(1)";
    },300);
}

/* 爆発演出 */
function explode(){
    document.getElementById("boom").innerText = "💥💥 ドーーーーン！！！";
}

</script>

</body>
</html>
