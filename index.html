<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マリ - ULTRA FULL MODE</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#050816;
    color:white;
    overflow-x:hidden;
    transition:0.4s;
}

/* ライトモード */
body.light {
    background:#f5f7fb;
    color:#111;
}

/* 背景レイヤー */
.bg {
    position:fixed;
    width:500px;
    height:500px;
    filter:blur(140px);
    opacity:0.2;
    z-index:-3;
}
.bg1 { background:#3b82f6; top:10%; left:10%; }
.bg2 { background:#8b5cf6; bottom:10%; right:10%; }

/* ナビ */
nav {
    position:fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    z-index:10;
}

/* セクション */
section {
    max-width:900px;
    margin:auto;
    padding:120px 20px;
    opacity:0;
    transform:translateY(40px);
    transition:0.8s;
}
.show {
    opacity:1;
    transform:translateY(0);
}

/* カード */
.card {
    background:rgba(255,255,255,0.07);
    padding:16px;
    margin:10px 0;
    border-radius:14px;
    backdrop-filter: blur(8px);
    transition:0.3s;
}
.card:hover {
    transform:scale(1.04);
}

/* 犬 */
#dog {
    width:180px;
    position:fixed;
    border-radius:50%;
    pointer-events:none;
    filter: drop-shadow(0 0 18px #60a5fa);
    transition:0.1s;
}

/* 星 */
.star {
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    animation:fall linear forwards;
}

@keyframes fall {
    from {transform:translateY(-10px);}
    to {transform:translateY(110vh);}
}

/* 粒子 */
.particle {
    position:fixed;
    width:6px;
    height:6px;
    background:#60a5fa;
    border-radius:50%;
    animation:pop 0.6s forwards;
}

@keyframes pop {
    to {transform:translateY(-60px) scale(0); opacity:0;}
}

/* スコア */
#score {
    position:fixed;
    bottom:10px;
    right:10px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<nav>
<div>🐶 MARI ULTRA FULL</div>
<div>
<button onclick="toggle()">🌙</button>
</div>
</nav>

<img src="IMG_0086.png" id="dog">

<section>
<h1>マリの日常</h1>
<p>全部入り・最終進化版</p>
</section>

<section>
<div class="card">🍜 ラーメン</div>
<div class="card">🥔 いも</div>
<div class="card">👤 しげおさん</div>
</section>

<section>
<div class="card">🌌 福島</div>
<div class="card">🌌 川俣町</div>
<div class="card">🌌 宇宙</div>
</section>

<div id="score">⭐ 0</div>

<script>

let score = 0;
let mouseX = 0;
let mouseY = 0;

/* スクロール表示 */
const sections = document.querySelectorAll("section");
window.addEventListener("scroll", ()=>{
    sections.forEach(s=>{
        if(s.getBoundingClientRect().top < window.innerHeight - 80){
            s.classList.add("show");
        }
    });
});

/* ダーク切替 */
function toggle(){
    document.body.classList.toggle("light");
}

/* マウス追従 */
document.addEventListener("mousemove",(e)=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
});

/* 犬AI追従 */
const dog = document.getElementById("dog");
dog.style.left = "100px";
dog.style.top = "100px";

function moveDog(){
    let x = parseFloat(dog.style.left);
    let y = parseFloat(dog.style.top);

    x += (mouseX - x) * 0.08;
    y += (mouseY - y) * 0.08;

    dog.style.left = x + "px";
    dog.style.top = y + "px";

    requestAnimationFrame(moveDog);
}
moveDog();

/* 星 */
function star(){
    const s = document.createElement("div");
    s.className="star";
    s.style.left = Math.random()*100 + "vw";
    s.style.animationDuration = (2+Math.random()*3)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),5000);
}
setInterval(star,120);

/* クリックエフェクト＋スコア */
document.addEventListener("click",(e)=>{
    score++;
    document.getElementById("score").innerText="⭐ "+score;

    const p = document.createElement("div");
    p.className="particle";
    p.style.left=e.clientX+"px";
    p.style.top=e.clientY+"px";
    document.body.appendChild(p);

    setTimeout(()=>p.remove(),600);
});

</script>

</body>
</html>
