<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マリ OP</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

/* 背景 */
#bg{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle,#1e3a8a,#000);
    animation:zoom 12s infinite alternate;
    z-index:-1;
}
@keyframes zoom{
    from{transform:scale(1);}
    to{transform:scale(1.25);}
}

/* テロップ */
.text{
    position:absolute;
    width:100%;
    text-align:center;
    top:45%;
    font-size:28px;
    opacity:0;
}

.show{ animation:in 1s forwards; }
.hide{ animation:out 1s forwards; }

@keyframes in{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes out{
    to{opacity:0; transform:translateY(-10px);}
}

/* 犬 */
#dog{
    position:absolute;
    bottom:18%;
    left:50%;
    transform:translateX(-50%);
    width:200px;
    opacity:0;
    filter: drop-shadow(0 0 20px #60a5fa);
}

/* SNS */
#sns{
    position:absolute;
    width:100%;
    text-align:center;
    top:50%;
    opacity:0;
    transition:1s;
}

#sns a{
    display:block;
    margin:10px;
    color:#60a5fa;
    text-decoration:none;
    font-size:18px;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- OPテロップ -->
<div class="text" id="t1">これは、とある犬の物語。</div>
<div class="text" id="t2">その名は──マリ</div>
<div class="text" id="t3">名前の由来は「マリオ」</div>
<div class="text" id="t4">飼い主・たかしが名付けた</div>
<div class="text" id="t5">福島で暮らす、小さな存在</div>
<div class="text" id="t6">好きなものは、いもとラーメン</div>
<div class="text" id="t7">そして人間「しげお」</div>
<div class="text" id="t8">この物語は、日常である</div>
<div class="text" id="t9">──マリのホームページ</div>

<img src="IMG_0086.png" id="dog">

<!-- SNS（最後に出す） -->
<div id="sns">
<h2>📱 SNS</h2>
<a href="https://www.youtube.com/channel/UCxWzjqvY4GezHyC8n5Ku_8g" target="_blank">
YouTube
</a>

<a href="https://www.instagram.com/takashi.4410/" target="_blank">
Instagram
</a>
</div>

<script>

const list=[
"t1","t2","t3","t4","t5","t6","t7","t8","t9"
];

let time=800;

/* OPテロップ */
list.forEach((id)=>{
    setTimeout(()=>{
        const el=document.getElementById(id);

        el.classList.add("show");

        setTimeout(()=>{
            el.classList.remove("show");
            el.classList.add("hide");
        },1500);

    },time);

    time+=1800;
});

/* 犬登場 */
setTimeout(()=>{
    const d=document.getElementById("dog");
    d.style.opacity=1;
    d.style.transition="1.5s";
},time);

/* SNS表示（OP後） */
setTimeout(()=>{
    const sns=document.getElementById("sns");
    sns.style.opacity=1;
},time+1500);

</script>

</body>
</html>
