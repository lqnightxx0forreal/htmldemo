<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マリ - GALAXY MODE</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#050714;
    color:white;
    overflow:hidden;
}

/* 背景グラデ */
#bg {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at 20% 20%, #3b82f6, transparent 40%),
                radial-gradient(circle at 80% 80%, #8b5cf6, transparent 40%);
    filter: blur(60px);
    z-index:-3;
}

/* 星 */
.star {
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    opacity:0.8;
    animation: fall linear forwards;
}

@keyframes fall {
    from { transform: translateY(-10px); }
    to { transform: translateY(110vh); }
}

/* UI */
section {
    padding:80px 20px;
    text-align:center;
}

.glass {
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    backdrop-filter: blur(10px);
    display:inline-block;
}

/* 犬 */
#dog {
    width:180px;
    border-radius:50%;
    position:fixed;
    transition:0.15s;
    filter: drop-shadow(0 0 20px #60a5fa);
    pointer-events:none;
}

/* スコア */
#score {
    position:fixed;
    bottom:10px;
    right:10px;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div id="bg"></div>

<section>
<div class="glass">
<h1>🐶 マリ GALAXY</h1>
<p>犬がマウスを追いかける世界</p>
</div>
</section>

<img src="IMG_0086.png" id="dog">

<div id="score">⭐ 0</div>

<script>

let score = 0;
let mouseX = 0;
let mouseY = 0;

/* マウス追従（犬AI） */
document.addEventListener("mousemove",(e)=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
});

/* 犬が追いかける */
function moveDog(){
    const dog = document.getElementById("dog");
    const x = parseFloat(dog.style.left || 100);
    const y = parseFloat(dog.style.top || 100);

    const dx = mouseX - x;
    const dy = mouseY - y;

    dog.style.left = (x + dx * 0.08) + "px";
    dog.style.top  = (y + dy * 0.08) + "px";

    requestAnimationFrame(moveDog);
}
moveDog();

/* 初期位置 */
const dog = document.getElementById("dog");
dog.style.left = "100px";
dog.style.top = "100px";

/* 星生成 */
function star(){
    const s = document.createElement("div");
    s.className="star";
    s.style.left = Math.random()*100 + "vw";
    s.style.animationDuration = (2+Math.random()*3)+"s";
    document.body.appendChild(s);

    setTimeout(()=>s.remove(),5000);
}
setInterval(star,80);

/* クリックで爆発＋スコア */
document.addEventListener("click",(e)=>{
    score++;
    document.getElementById("score").innerText="⭐ "+score;

    const boom = document.createElement("div");
    boom.style.position="fixed";
    boom.style.left=e.clientX+"px";
    boom.style.top=e.clientY+"px";
    boom.style.color="#60a5fa";
    boom.innerText="✦";
    boom.style.fontSize="20px";

    document.body.appendChild(boom);
    setTimeout(()=>boom.remove(),500);
});

</script>

</body>
</html>
