<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マリのホームページ</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:black;
    color:white;
    overflow-x:hidden;
}

/* OP */
#op{
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* 背景 */
#op::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle,#1e3a8a,#000);
    animation:bgmove 14s linear infinite;
}
@keyframes bgmove{
    to{transform:scale(1.3);}
}

/* テキスト */
.text{
    position:absolute;
    width:100%;
    text-align:center;
    top:45%;
    font-size:26px;
    opacity:0;
}

/* フェード */
.show{
    animation:fade 2s forwards;
}
@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1;}
}

/* 犬 */
#dog{
    position:absolute;
    bottom:20%;
    left:50%;
    transform:translateX(-50%);
    width:180px;
    opacity:0;
}

/* フラッシュ */
#flash{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
}

/* 本編 */
#main{
    background:#050816;
    padding:100px 20px;
    text-align:center;
}

.card{
    max-width:700px;
    margin:20px auto;
    padding:20px;
    background:rgba(255,255,255,0.08);
    border-radius:12px;
}

/* SNS */
a{
    color:#60a5fa;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- OP -->
<section id="op">

<div id="flash"></div>

<div class="text" id="t1">マリのホームページ</div>
<div class="text" id="t2">その名前には、物語がある</div>
<div class="text" id="t3">「マリ」</div>
<div class="text" id="t4">それは、飼い主たかしが</div>
<div class="text" id="t5">かつて好きだったゲームから――</div>
<div class="text" id="t6">マリオ</div>
<div class="text" id="t7">そこから生まれた名前</div>
<div class="text" id="t8">マリ</div>
<div class="text" id="t9">Presented by たかし</div>

<img src="IMG_0086.png" id="dog">

</section>

<!-- 本編 -->
<section id="main">

<h1>🐶 ようこそ、マリの世界へ</h1>

<div class="card">名前：マリ</div>
<div class="card">由来：マリオから</div>
<div class="card">飼い主：たかし</div>

<div class="card">
📺 YouTube<br>
<a href="https://www.youtube.com/channel/UCxWzjqvY4GezHyC8n5Ku_8g" target="_blank">
チャンネルを見る
</a>
</div>

<div class="card">
📷 Instagram<br>
<a href="https://www.instagram.com/takashi.4410/" target="_blank">
アカウントを見る
</a>
</div>

</section>

<script>

/* テロップ順番 */
const list = [
    "t1","t2","t3","t4","t5","t6","t7","t8","t9"
];

list.forEach((id,i)=>{
    setTimeout(()=>{
        const el=document.getElementById(id);
        el.classList.add("show");

        setTimeout(()=>{
            el.style.opacity=0;
        },2000);

    },i*1800+500);
});

/* 犬 */
setTimeout(()=>{
    const dog=document.getElementById("dog");
    dog.style.opacity=1;
    dog.style.transition="1.5s";
},12000);

/* フラッシュ */
setTimeout(()=>{
    const f=document.getElementById("flash");
    f.style.opacity=0.8;
    setTimeout(()=>f.style.opacity=0,200);
},12200);

/* スクロールでOP消える */
window.addEventListener("scroll",()=>{
    const op=document.getElementById("op");
    op.style.opacity=1-window.scrollY/400;
});

</script>

</body>
</html>
