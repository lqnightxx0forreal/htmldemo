<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マリの日常 - ULTRA SPACE</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#050816;
    color:white;
    overflow-x:hidden;
}

/* 光の背景（レイヤー） */
.bg1, .bg2 {
    position:fixed;
    width:500px;
    height:500px;
    filter:blur(160px);
    opacity:0.15;
    z-index:-2;
}
.bg1 { background:#3b82f6; top:10%; left:10%; }
.bg2 { background:#8b5cf6; bottom:10%; right:10%; }

/* ナビ */
nav {
    position:fixed;
    width:100%;
    top:0;
    padding:10px;
    display:flex;
    justify-content:space-between;
    background:rgba(10,15,30,0.7);
    backdrop-filter: blur(10px);
    z-index:10;
}

/* セクション */
section {
    max-width:900px;
    margin:auto;
    padding:130px 20px;
    opacity:0;
    transform:translateY(60px);
    transition:1s;
}
.show {
    opacity:1;
    transform:translateY(0);
}

/* カード */
.card {
    background:rgba(255,255,255,0.06);
    padding:18px;
    margin:12px 0;
    border-radius:14px;
    transition:0.3s;
    backdrop-filter: blur(6px);
}
.card:hover {
    transform:scale(1.06);
}

/* 犬 */
.dog {
    width:220px;
    display:block;
    margin:auto;
    border-radius:50%;
    cursor:pointer;
    filter: drop-shadow(0 0 20px #60a5fa);
    transition:0.3s;
}
.dog:hover {
    transform:scale(1.15) rotate(6deg);
}

/* ボタン */
button {
    background:#3b82f6;
    border:none;
    padding:8px 14px;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* 流れ星 */
.star {
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    top:-10px;
    animation:fall linear;
    opacity:0.8;
}

@keyframes fall {
    0% {transform:translateY(0) translateX(0); opacity:1;}
    100% {transform:translateY(120vh) translateX(-250px); opacity:0;}
}

/* クリック粒子 */
.particle {
    position:fixed;
    width:6px;
    height:6px;
    background:#60a5fa;
    border-radius:50%;
    pointer-events:none;
    animation:pop 0.6s forwards;
}

@keyframes pop {
    to {
        transform:translateY(-80px) scale(0);
        opacity:0;
    }
}

/* ゲーム表示 */
#score {
    position:fixed;
    bottom:10px;
    right:10px;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<nav>
<div>🐶 MARI ULTRA</div>
<button onclick="invert()">🌙</button>
</nav>

<section>
<h1>マリの日常</h1>
<p>宇宙レベルまで進化した犬サイト</p>

<img src="IMG_0086.png" class="dog" id="dog">
</section>

<section>
<h2>好きなもの</h2>
<div class="card">🍜 ラーメン</div>
<div class="card">🥔 いも</div>
<div class="card">👤 しげおさん</div>
</section>

<section>
<h2>宇宙スポット</h2>
<div class="card">福島県</div>
<div class="card">川俣町</div>
<div class="card">銀河</div>
</section>

<section>
<h2>実験エリア</h2>
<button onclick="explode()">押す</button>
<div id="boom"></div>
</section>

<div id="score">⭐ score: 0</div>

<script>

let score = 0;

/* スクロール表示 */
const sections = document.querySelectorAll("section");
window.addEventListener("scroll", ()=>{
    sections.forEach(s=>{
        if(s.getBoundingClientRect().top < window.innerHeight - 80){
            s.classList.add("show");
        }
    });
});

/* 反転モード（静かダーク切替） */
function invert(){
    document.body.style.filter =
    document.body.style.filter === "invert(1)" ? "invert(0)" : "invert(1)";
}

/* 犬クリック */
document.getElementById("dog").onclick = ()=>{
    const d = document.getElementById("dog");
    d.style.transform="translateY(-100px) scale(1.2)";
    setTimeout(()=>d.style.transform="translateY(0) scale(1)",300);
    addScore();
};

/* 爆発 */
function explode(){
    document.getElementById("boom").innerText="✨反応あり";
}

/* 流れ星 */
function star(){
    const s = document.createElement("div");
    s.className="star";
    s.style.left = Math.random()*100 + "vw";
    s.style.animationDuration = (2+Math.random()*3)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),5000);
}
setInterval(star,150);

/* クリック粒子 */
document.body.addEventListener("click",(e)=>{
    const p = document.createElement("div");
    p.className="particle";
    p.style.left=e.clientX+"px";
    p.style.top=e.clientY+"px";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),600);
});

/* スコア */
function addScore(){
    score++;
    document.getElementById("score").innerText="⭐ score: "+score;
}

</script>

</body>
</html>
